{% extends "tracker/layout.html" %}
{% load crispy_forms_tags %}

{% block content %}
<section class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-header">
                <h3 class="text-center">Confirm Delete</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <p>Are you sure you want to delete this transaction? {{ transaction.description }}</p>
                    <button class="btn btn-danger" type="submit">Yes, Delete</button>
                    <a href="{% url 'expense_report' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
